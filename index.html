<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0c">
<title>Claqueta Digital</title>
<style>
  :root{
    --bg:#0b0b0c;
    --bg-panel:#17181a;
    --bg-input:#1f2023;
    --fg:#f3f1ea;
    --fg-dim:#9a9a96;
    --border:#2c2d30;
    --accent:#ff4d2e;
    --accent-good:#4ade80;
    --mono: ui-monospace, 'SF Mono', 'Roboto Mono', 'Courier New', monospace;
    --sans: -apple-system, system-ui, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:var(--sans); overscroll-behavior:none;}
  body{ -webkit-user-select:none; user-select:none; }

  /* ---------- estructura general ---------- */
  .screen{ display:none; height:100%; width:100%; }
  .screen.active{ display:block; }

  /* ================= PANTALLA EDICION ================= */
  #screen-edit{ overflow-y:auto; height:100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 16px) env(safe-area-inset-left); }
  .edit-inner{ max-width:560px; margin:0 auto; padding:14px 14px 100px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:6px 2px 14px; }
  .topbar h1{ font-family:var(--mono); font-size:15px; letter-spacing:.12em; font-weight:600; margin:0; color:var(--fg);}
  .icon-btn{ background:var(--bg-panel); border:1px solid var(--border); color:var(--fg);
    width:40px; height:40px; border-radius:8px; font-size:18px; display:flex; align-items:center; justify-content:center; }
  .icon-btn-danger{ color:var(--accent); }
  .session-card{ display:flex; align-items:center; justify-content:space-between; }
  .session-card h2{ margin:0; }
  .session-actions{ display:flex; gap:8px; }

  .card{ background:var(--bg-panel); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; }
  .card h2{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--fg-dim); margin:0 0 10px; font-weight:600; display:flex; align-items:center; justify-content:space-between; }
  .card h2.collapsible{ cursor:pointer; }
  .card h2 .chev{ font-size:10px; transition:transform .15s; }
  .card.collapsed .card-body{ display:none; }
  .card.collapsed h2 .chev{ transform:rotate(-90deg); }

  /* ---- escena / plano / toma ---- */
  .sst-edit-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .sst-edit-grid-2{ grid-template-columns:1fr 1fr; }
  .seg-edit{ background:var(--bg-input); border:1px solid var(--border); border-radius:8px;
    padding:8px 6px; text-align:center; }
  .seg-edit .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:var(--fg-dim); text-transform:uppercase; margin-bottom:6px; }
  .cam-segmented{ height:38px; margin-top:2px; }
  .cam-segmented button{ font-weight:700; font-size:20px; padding:0; color:var(--fg); }
  .sst-edit{ background:var(--bg-input); border:1px solid var(--border); border-radius:8px;
    padding:8px 6px; text-align:center; }
  .sst-edit .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:var(--fg-dim); text-transform:uppercase; }
  .sst-edit .val{ font-family:var(--mono); font-size:30px; font-weight:700; margin:4px 0; line-height:1; }
  .sst-edit .row{ display:flex; align-items:center; justify-content:center; gap:6px; }
  .step-btn{ background:var(--bg-input); border:1px solid var(--border); color:var(--fg);
    width:38px; height:38px; border-radius:8px; font-size:20px; font-family:var(--mono); display:flex; align-items:center; justify-content:center; }
  .step-btn:active{ background:var(--border); }

  /* ---- segmentados (INT/EXT, DIA/NOCHE, SND) ---- */
  .seg-group{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .seg-group:last-child{ margin-bottom:0; }
  .segmented{ display:flex; flex:1; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .segmented button{ flex:1; background:var(--bg-input); border:none; color:var(--fg-dim);
    font-family:var(--mono); font-size:12px; letter-spacing:.08em; padding:10px 4px; }
  .segmented button + button{ border-left:1px solid var(--border); }
  .segmented button.active{ background:var(--accent); color:#1a0e08; font-weight:700; }
  .lang-switch{ flex:0 0 auto; width:auto; }
  .lang-switch button{ padding:8px 9px; font-size:11px; }

  /* ---- ajustes tecnicos (steppers normales) ---- */
  .stepper-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stepper{ background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .stepper .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:var(--fg-dim); text-transform:uppercase; margin-bottom:4px; }
  .stepper .row{ display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .stepper .val{ font-family:var(--mono); font-size:18px; font-weight:600; flex:1; text-align:center; }
  .stepper .step-btn{ width:32px; height:32px; font-size:16px; flex:0 0 auto; }
  .stepper .val input{ width:100%; background:transparent; border:none; color:var(--fg);
    font-family:var(--mono); font-size:18px; font-weight:600; text-align:center; }
  .wb-toggle{ font-family:var(--mono); font-size:10px; color:var(--fg-dim); border:1px solid var(--border);
    border-radius:6px; padding:2px 5px; flex:0 0 auto; background:var(--bg-panel); }
  .wb-toggle.active{ color:var(--accent); border-color:var(--accent); }

  /* ---- checkboxes ---- */
  .check-row{ display:flex; align-items:center; gap:10px; padding:8px 2px; font-family:var(--mono); font-size:13px; letter-spacing:.04em; }
  .check-row input{ width:20px; height:20px; accent-color:var(--accent); }
  .check-row.good input{ accent-color:var(--accent-good); }

  /* ---- boton publicar ---- */
  .btn-publicar{ position:fixed; left:0; right:0; bottom:0; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(11,11,12,0) 0%, var(--bg) 35%); }
  .btn-publicar button{ width:100%; max-width:560px; margin:0 auto; display:block; background:var(--accent);
    color:#1a0e08; border:none; border-radius:10px; padding:16px; font-family:var(--mono);
    font-size:15px; font-weight:700; letter-spacing:.2em; }
  .btn-publicar button:active{ filter:brightness(.9); }

  /* ================= PANTALLA QR / DATOS ================= */
  #screen-display{ position:relative; height:100vh; width:100vw; overflow:hidden; touch-action:none; }
  .view{ position:absolute; top:0; right:0; bottom:0; left:0; display:none; }
  .view.active{ display:flex; }
  #view-qr{ align-items:center; justify-content:center; }
  #qr-canvas{ width:min(92vw,92vh); height:min(92vw,92vh); }

  #view-data{ flex-direction:column; padding: calc(env(safe-area-inset-top) + 14px) calc(env(safe-area-inset-right) + 14px) calc(env(safe-area-inset-bottom) + 14px) calc(env(safe-area-inset-left) + 14px); }
  .badges-top{ display:flex; flex-wrap:wrap; gap:6px; align-content:flex-start; padding-right:46px; }
  .badge{ font-family:var(--mono); font-size:13px; font-size:clamp(11px,2.6vw,15px); color:var(--fg); border:1px solid var(--border);
    border-radius:6px; padding:4px 9px; background:rgba(255,255,255,.03); white-space:nowrap; }
  .badge .l{ color:var(--fg-dim); font-size:.8em; margin-right:5px; }

  .sst-mid{ flex:1; display:flex; align-items:center; justify-content:center; padding:14px 0; min-height:0; }
  .sst-grid{ display:grid; gap:12px; width:100%; height:100%; max-height:100%; }
  .sst-box{ border:1px solid var(--border); border-radius:14px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:0; overflow:hidden; }
  .sst-box .l{ font-family:var(--mono); font-size:13px; font-size:clamp(11px,2.4vw,15px); letter-spacing:.18em; color:var(--fg-dim); text-transform:uppercase; }
  .sst-box .v{ font-family:var(--mono); font-weight:700; line-height:1; font-size:80px; font-size:clamp(28px,12vh,18vw); }

  .badges-bottom{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; padding-top:10px; }

  /* portrait: SC y PL arriba lado a lado, TK abajo ancho completo */
  @media (orientation: portrait){
    .sst-grid{ grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
    .sst-sc{ grid-column:1; grid-row:1; }
    .sst-sh{ grid-column:2; grid-row:1; }
    .sst-tk{ grid-column:1 / span 2; grid-row:2; }
  }
  /* landscape: SC, PL, TK tres cajas iguales en fila */
  @media (orientation: landscape){
    .sst-grid{ grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr; }
  }

  .edit-icon{ position:absolute; top: calc(env(safe-area-inset-top) + 12px); right: calc(env(safe-area-inset-right) + 12px);
    z-index:5; opacity:.55; }

  /* ---- overlays: cuenta atras / flash ---- */
  .overlay{ position:absolute; top:0; right:0; bottom:0; left:0; display:flex; align-items:center; justify-content:center;
    z-index:20; pointer-events:none; opacity:0; transition:opacity .08s; }
  .overlay.show{ opacity:1; }
  #countdown-overlay{ background:var(--bg); }
  #countdown-overlay span{ font-family:var(--mono); font-weight:700; font-size:42vh; color:var(--fg); }
  #flash-overlay{ background:#ff1a1a; }

  /* ---- toast export ---- */
  #toast{ position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px);
    background:var(--bg-panel); border:1px solid var(--border); color:var(--fg); font-family:var(--mono);
    font-size:12px; padding:10px 16px; border-radius:8px; opacity:0; transition:opacity .2s, transform .2s; z-index:30; pointer-events:none; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ================= PANTALLA EDICION ================= -->
<div id="screen-edit" class="screen active">
  <div class="edit-inner">

    <div class="topbar">
      <h1 data-i18n="title">CLAQUETA DIGITAL</h1>
      <div class="lang-switch segmented" data-field="lang">
        <button data-value="eu">EU</button>
        <button data-value="es">ES</button>
        <button data-value="en">EN</button>
      </div>
    </div>

    <div class="card session-card">
      <h2 data-i18n="sesion_section">Sesión</h2>
      <div class="session-actions">
        <button id="btn-export" class="icon-btn" title="Exportar log de sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M12 16V4"/>
            <path d="M7 9l5-5 5 5"/>
            <rect x="4" y="14" width="16" height="6" rx="1"/>
          </svg>
        </button>
        <button id="btn-reset" class="icon-btn icon-btn-danger" title="Reiniciar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M3 6h18"/>
            <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
            <path d="M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Camara / Tarjeta -->
    <div class="card">
      <div class="sst-edit-grid sst-edit-grid-2">
        <div class="seg-edit" data-field="cam">
          <div class="lbl" data-i18n="camara">Cámara</div>
          <div class="segmented cam-segmented" data-field="cam">
            <button data-value="A">A</button>
            <button data-value="B">B</button>
            <button data-value="C">C</button>
          </div>
        </div>
        <div class="sst-edit" data-field="card">
          <div class="lbl" data-i18n="tarjeta">Tarjeta</div>
          <div class="val" data-val>01</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- INT/EXT, DIA/NOCHE -->
    <div class="card">
      <div class="seg-group">
        <div class="segmented" data-field="int">
          <button data-value="INT">INT</button>
          <button data-value="EXT">EXT</button>
        </div>
        <div class="segmented" data-field="dn">
          <button data-value="DIA" data-i18n="dia">DÍA</button>
          <button data-value="NOCHE" data-i18n="noche">NOCHE</button>
        </div>
      </div>
    </div>

    <!-- Escena / Plano / Toma -->
    <div class="card">
      <div class="sst-edit-grid">
        <div class="sst-edit" data-field="sc">
          <div class="lbl" data-i18n="escena">Escena</div>
          <div class="val" data-val>1</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="sst-edit" data-field="sh">
          <div class="lbl" data-i18n="plano">Plano</div>
          <div class="val" data-val>1</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="sst-edit" data-field="tk">
          <div class="lbl" data-i18n="toma">Toma</div>
          <div class="val" data-val>1</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Ajustes tecnicos -->
    <div class="card">
      <h2 data-i18n="ajustes">Ajustes técnicos</h2>
      <div class="stepper-grid">
        <div class="stepper" data-field="fps">
          <div class="lbl">FPS</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <div class="val" data-val>25</div>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="stepper" data-field="mm">
          <div class="lbl" data-i18n="lente">Lente (mm)</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <div class="val" data-val>35</div>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="stepper" data-field="sht">
          <div class="lbl" data-i18n="obturador">Obturador 1/x</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <div class="val" data-val>50</div>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="stepper" data-field="iso">
          <div class="lbl">ISO</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <div class="val" data-val>800</div>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="stepper" data-field="ap">
          <div class="lbl" data-i18n="diafragma">Diafragma f/</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <div class="val" data-val>2.8</div>
            <button class="step-btn" data-dir="1">+</button>
          </div>
        </div>
        <div class="stepper" data-field="wb">
          <div class="lbl" data-i18n="wb">Balance de blancos (K)</div>
          <div class="row">
            <button class="step-btn" data-dir="-1">&minus;</button>
            <div class="val" data-val>
              <span class="wb-display">5600</span>
              <input class="wb-input" type="number" step="50" min="1500" max="10000" style="display:none">
            </div>
            <button class="step-btn" data-dir="1">+</button>
            <button class="wb-toggle" id="wb-toggle" title="Entrada manual en Kelvin">K</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Flags -->
    <div class="card">
      <label class="check-row good" id="row-good"><input type="checkbox" id="f-good"> <span id="f-good-label">Toma buena</span></label>
    </div>


  </div>

  <div class="btn-publicar">
    <button id="btn-publicar" data-i18n="publicar">PUBLICAR</button>
  </div>
</div>

<!-- ================= PANTALLA QR / DATOS ================= -->
<div id="screen-display" class="screen">

  <div id="view-qr" class="view active">
    <canvas id="qr-canvas"></canvas>
  </div>

  <div id="view-data" class="view">
    <div class="badges-top" id="badges-top"></div>
    <div class="sst-mid">
      <div class="sst-grid">
        <div class="sst-box sst-sc"><div class="l" data-i18n="escena">Escena</div><div class="v" id="d-sc">1</div></div>
        <div class="sst-box sst-sh"><div class="l" data-i18n="plano">Plano</div><div class="v" id="d-sh">1</div></div>
        <div class="sst-box sst-tk"><div class="l" data-i18n="toma">Toma</div><div class="v" id="d-tk">1</div></div>
      </div>
    </div>
    <div class="badges-bottom" id="badges-bottom"></div>
  </div>

  <button id="btn-edit-icon" class="icon-btn edit-icon">&#9998;</button>

  <div id="countdown-overlay" class="overlay"><span id="countdown-number">3</span></div>
  <div id="flash-overlay" class="overlay"></div>
</div>

<div id="toast"></div>

<script>

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2

  /**

  qrcode.createStringToBytes = function(unicodeData, numChars) {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

/* ---- listas de valores estándar de la industria para los steppers ---- */
const FPS_LIST = [23.976, 24, 25, 29.97, 30, 48, 50, 59.94, 60, 100, 120];
const SHUTTER_LIST = [25, 30, 48, 50, 60, 96, 100, 120, 125, 180, 200, 250, 500, 1000];
const ISO_LIST = [100,200,400,500,640,800,1000,1250,1600,2000,2500,3200,4000,5000,6400,8000,10000,12800,16000,25600];
const APERTURE_LIST = [1.0,1.1,1.2,1.4,1.6,1.8,2,2.2,2.5,2.8,3.2,3.5,4,4.5,5.0,5.6,6.3,7.1,8,9,10,11,13,14,16,18,20,22,25,29,32];
const WB_LIST = [2700,3000,3200,3800,4300,5000,5600,6500,7500];

/* ---- estado persistente ---- */
const DEFAULT_STATE = {
  cam:'A', card:1,
  sc:1, sh:1, tk:1,
  int:'INT', dn:'DIA',
  fps:25, mm:35, sht:50, iso:800, ap:2.8, wb:5600, wbCustom:false,
  tomaBuena:false, pendingAdvance:false,
  pendingGood:'', lastTakeNumber:null,
  view:'edit', sub:'qr', lang:'es',
  lastPayload:null, lastClapPayload:null,
  log:[]
};

function loadState(){
  try{
    const saved = JSON.parse(localStorage.getItem('claquetaState'));
    if(saved && typeof saved === 'object') return Object.assign({}, DEFAULT_STATE, saved);
  }catch(e){ /* sin estado guardado o corrupto: se usa el por defecto */ }
  return Object.assign({}, DEFAULT_STATE);
}
function saveState(){
  localStorage.setItem('claquetaState', JSON.stringify(state));
}
let state = loadState();

/* ---- helpers de formato y steppers ---- */
function formatFps(v){
  if(Number.isInteger(v)) return String(v);
  return v.toFixed(3).replace(/0+$/,'').replace(/\.$/,'');
}
function formatAp(v){ return String(v); }
function formatCard(v){ return String(v).padStart(2,'0'); }

function clampList(list, current, dir){
  let idx = list.indexOf(current);
  if(idx === -1){
    idx = 0;
    let best = Infinity;
    list.forEach((v,i)=>{ const d = Math.abs(v-current); if(d<best){ best=d; idx=i; } });
  }
  idx = Math.min(list.length-1, Math.max(0, idx+dir));
  return list[idx];
}
function clampNum(current, dir, step, min, max){
  return Math.min(max, Math.max(min, current + dir*step));
}

/* ---- render pantalla de edicion ---- */
function setSegmented(field, value){
  document.querySelectorAll(`.segmented[data-field="${field}"] button`).forEach(b=>{
    b.classList.toggle('active', b.dataset.value === value);
  });
}

function renderWB(){
  const stepperEl = document.querySelector('.stepper[data-field="wb"]');
  const display = stepperEl.querySelector('.wb-display');
  const input = stepperEl.querySelector('.wb-input');
  const toggle = document.getElementById('wb-toggle');
  if(state.wbCustom){
    display.style.display = 'none';
    input.style.display = 'block';
    input.value = state.wb;
    toggle.classList.add('active');
  } else {
    display.style.display = 'inline';
    input.style.display = 'none';
    display.textContent = state.wb;
    toggle.classList.remove('active');
  }
}

  document.querySelector('.stepper[data-field="iso"] [data-val]').textContent = state.iso;

  document.querySelector('.sst-edit[data-field="card"] [data-val]').textContent = formatCard(state.card);

/* ---- eventos pantalla de edicion ---- */
document.querySelectorAll('.sst-edit .step-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const field = btn.closest('.sst-edit').dataset.field;
    const dir = parseInt(btn.dataset.dir, 10);
    state[field] = Math.max(1, state[field] + dir);
    renderEdit(); saveState();
  });
});

document.querySelectorAll('.segmented button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const group = btn.closest('.segmented');
    state[group.dataset.field] = btn.dataset.value;
    renderEdit(); saveState();
    if(group.dataset.field === 'lang' && state.lastPayload) renderDataView(state.lastPayload);
  });
});

document.querySelectorAll('.stepper-grid .stepper .step-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const field = btn.closest('.stepper').dataset.field;
    const dir = parseInt(btn.dataset.dir, 10);
    switch(field){
      case 'fps': state.fps = clampList(FPS_LIST, state.fps, dir); break;
      case 'mm':  state.mm  = clampNum(state.mm, dir, 1, 8, 300); break;
      case 'sht': state.sht = clampList(SHUTTER_LIST, state.sht, dir); break;
      case 'iso': state.iso = clampList(ISO_LIST, state.iso, dir); break;
      case 'ap':  state.ap  = clampList(APERTURE_LIST, state.ap, dir); break;
      case 'wb':
        if(state.wbCustom) state.wb = clampNum(state.wb, dir, 50, 1500, 10000);
        else state.wb = clampList(WB_LIST, state.wb, dir);
        break;
    }
    renderEdit(); saveState();
  });
});

document.getElementById('wb-toggle').addEventListener('click', ()=>{
  state.wbCustom = !state.wbCustom;
  renderEdit(); saveState();
});
document.querySelector('.wb-input').addEventListener('change', (e)=>{
  let v = parseInt(e.target.value, 10);
  if(isNaN(v)) v = state.wb;
  state.wb = Math.min(10000, Math.max(1500, v));
  renderEdit(); saveState();
});

document.querySelectorAll('.collapsible').forEach(h=>{
  h.addEventListener('click', ()=>{
    document.getElementById(h.dataset.toggle).classList.toggle('collapsed');
  });
});

document.getElementById('f-good').addEventListener('change', e=>{ state.tomaBuena = e.target.checked; saveState(); });

/* ---- generacion del payload del QR ---- */
function buildPayload(goodVal){
  const now = new Date();
  const pad2 = (n)=> (n<10?'0':'') + n;
  const tc = pad2(now.getHours()) + ':' + pad2(now.getMinutes()) + ':' + pad2(now.getSeconds());
  return {
    v:1,
    dt:now.toISOString().slice(0,10), tc:tc,
    sc:state.sc, sh:state.sh, tk:state.tk,
    cam:state.cam, card:state.card,
    int:state.int, dn:state.dn,
    fps:state.fps, mm:state.mm, sht:state.sht, iso:state.iso, ap:state.ap, wb:state.wb,
    good:goodVal
  };
}

/* ---- pantallas ---- */
function switchScreen(name){
  state.view = name;
  document.getElementById('screen-edit').classList.toggle('active', name === 'edit');
  document.getElementById('screen-display').classList.toggle('active', name === 'display');
  saveState();
}
function setSub(sub){
  state.sub = sub;
  document.getElementById('view-qr').classList.toggle('active', sub === 'qr');
  document.getElementById('view-data').classList.toggle('active', sub === 'data');
  saveState();
  if(sub === 'qr' && state.lastClapPayload) drawQR(state.lastClapPayload, document.getElementById('qr-canvas'), '#ffffff', '#000000');
}

/* ---- dibujo del QR. Por defecto: claro sobre fondo oscuro en #qr-canvas
   (modulos invertidos). Acepta canvas/colores alternativos para otros usos
   (p.ej. el QR de claqueta sobre fondo blanco). ---- */
function drawQR(payload, canvas, bgColor, fgColor){
  canvas = canvas || document.getElementById('qr-canvas');
  const json = JSON.stringify(payload);
  const qr = qrcode(0, 'M');
  qr.addData(json);
  qr.make();
  const count = qr.getModuleCount();

  const cssSize = canvas.getBoundingClientRect().width
    || Math.min(window.innerWidth, window.innerHeight) * 0.92;
  const dpr = window.devicePixelRatio || 1;
  const margin = 4; // modulos de zona de silencio (mismo color que el fondo)
  const cell = Math.max(1, Math.floor((cssSize * dpr) / (count + margin * 2)));
  const pixelSize = cell * (count + margin * 2);

  canvas.width = pixelSize;
  canvas.height = pixelSize;
  canvas.style.width = (pixelSize / dpr) + 'px';
  canvas.style.height = (pixelSize / dpr) + 'px';

  const ctx = canvas.getContext('2d');
  const css = getComputedStyle(document.documentElement);
  const bg = bgColor || css.getPropertyValue('--bg').trim();
  const fg = fgColor || css.getPropertyValue('--fg').trim();

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, pixelSize, pixelSize);

  ctx.fillStyle = fg;
  for(let r=0; r<count; r++){
    for(let c=0; c<count; c++){
      if(qr.isDark(r,c)){
        ctx.fillRect((c+margin)*cell, (r+margin)*cell, cell, cell);
      }
    }
  }
}

/* ---- payload del QR de claqueta: se genera en el instante exacto del
   flash, con el timestamp del dispositivo (ISO 8601, milisegundos).
   Codifica solo lo esencial: sirve como ancla de sincronizacion
   (TC de claqueta) y para identificar la toma en la app de escritorio. ---- */
function buildFlashPayload(){
  const now = new Date();
  return {
    v:1, type:'clap',
    ts: now.toISOString(),
    sc:state.sc, sh:state.sh, tk:state.tk,
    cam:state.cam, card:state.card
  };
}

/* ---- secuencia de QR tras el clap: mismo payload (mismo timestamp),
   fondo con luminancia decreciente en pasos de 1s. Da margen para que
   al menos un paso coincida con la exposicion de la camara. Al terminar,
   vuelve a la vista de datos automaticamente. ---- */
const QR_FADE_BACKGROUNDS = ['#ffffff','#cccccc','#999999','#666666','#333333','#0d0d0d'];

function runQrFadeSequence(payload){
  const canvas = document.getElementById('qr-canvas');
  let i = 0;
  function step(){
    if(state.view !== 'display'){
      return;
    }
    if(i >= QR_FADE_BACKGROUNDS.length){
      setSub('data');
      return;
    }
    drawQR(payload, canvas, QR_FADE_BACKGROUNDS[i], '#000000');
    i += 1;
    setTimeout(step, 1000);
  }
  step();
}

/* ---- vista de datos ---- */
function makeBadge(label, value){
  const span = document.createElement('span');
  span.className = 'badge';
  span.innerHTML = `<span class="l">${label}</span>${value}`;
  return span;
}
function renderDataView(payload){
  document.getElementById('d-sc').textContent = payload.sc;
  document.getElementById('d-sh').textContent = payload.sh;
  document.getElementById('d-tk').textContent = payload.tk;

  const top = document.getElementById('badges-top');
  top.innerHTML = '';
  [
    [t('b_cam'), `${payload.cam || '–'}·${formatCard(payload.card)}`],
    [t('b_esc'), `${payload.int}·${payload.dn}`],
    [t('b_fps'), formatFps(payload.fps)],
    [t('b_lente'), `${payload.mm}mm`],
    [t('b_obt'), `1/${payload.sht}`],
    [t('b_iso'), payload.iso],
    [t('b_diaf'), `f/${formatAp(payload.ap)}`],
    [t('b_wb'), `${payload.wb}K`],
  ].forEach(([l,v]) => top.appendChild(makeBadge(l,v)));

  const bottom = document.getElementById('badges-bottom');
  bottom.innerHTML = '';
}

/* ---- publicar ---- */
function publicar(){
  const goodToUse = state.pendingGood || '';
  const payload = buildPayload(goodToUse);

  state.lastPayload = payload;
  saveState();

  renderDataView(payload);
  switchScreen('display');
  setSub('data');
}
document.getElementById('btn-publicar').addEventListener('click', publicar);

/* ---- confirmar rodaje: se llama cuando la cuenta atras llega al flash.
   Este es el momento real de "se ha grabado esta toma": se registra en
   el log de sesion y se fija el "good" para el siguiente QR si procede.
   El avance de Toma NO se aplica aqui (para soportar repetir la cuenta
   atras varias veces sobre la misma toma, p.ej. "segundo chac"); queda
   marcado como pendiente y se aplica una sola vez al volver a Editar. ---- */
function confirmRoll(clapPayload){
  const goodToUse = state.pendingGood || '';

  state.log.push({
    ts: new Date().toISOString(),
    clap_ts: clapPayload ? clapPayload.ts : '',
    sc: state.sc, sh: state.sh, tk: state.tk,
    cam: state.cam, card: state.card,
    int: state.int, dn: state.dn,
    toma_buena: state.tomaBuena, good_enviado: goodToUse
  });

  state.pendingGood = state.tomaBuena ? `${state.sc}-${state.sh}-${state.tk}` : '';
  state.lastTakeNumber = state.tk;
  state.pendingAdvance = true;

  saveState();
}
window.confirmRoll = confirmRoll;

/* ---- al volver a Editar: si hay un avance pendiente (se confirmo al
   menos un rodaje de la toma actual), se aplica una sola vez. Si se
   repitio la cuenta atras varias veces sin volver a Editar entremedias,
   solo cuenta como un avance. ---- */
document.getElementById('btn-edit-icon').addEventListener('click', ()=>{
  if(state.pendingAdvance){
    state.tomaBuena = false;
    state.tk += 1;
    state.pendingAdvance = false;
    saveState();
  }
  switchScreen('edit');
  renderEdit();
});

/* ---- gestos: swipe (1 dedo) y pulsacion larga (2-3 dedos) ---- */
let touchStartX = 0, touchStartY = 0, swipeCandidate = false;
let longPressTimer = null, longPressFired = false;

function handleLongPressStart(e){
  if(e.touches.length >= 2 && !longPressTimer && !longPressFired){
    longPressTimer = setTimeout(()=>{
      longPressFired = true;
      runCountdown();
    }, 700);
  }
}
function handleLongPressMove(e){
  if(e.touches.length < 2 && longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}
function handleLongPressEnd(e){
  if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; }
  if(e.touches.length === 0) longPressFired = false;
}

const displayEl = document.getElementById('screen-display');

displayEl.addEventListener('touchstart', (e)=>{
  unlockAudio();
  if(e.touches.length === 1){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    swipeCandidate = true;
  } else {
    swipeCandidate = false;
  }
  handleLongPressStart(e);
}, {passive:true});

displayEl.addEventListener('touchmove', (e)=>{
  if(e.touches.length !== 1) swipeCandidate = false;
  handleLongPressMove(e);
}, {passive:true});

displayEl.addEventListener('touchend', (e)=>{
  if(swipeCandidate && e.changedTouches.length === 1){
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5){
      // el swipe ya no cambia de vista: la vista QR solo se muestra
      // automaticamente tras el flash, con su propia secuencia
    }
  }
  swipeCandidate = false;
  handleLongPressEnd(e);
}, {passive:true});

displayEl.addEventListener('touchcancel', handleLongPressEnd, {passive:true});

/* ---- cuenta atras 3-2-1 + flash rojo + clap ---- */
function runCountdown(){
  const cdOverlay = document.getElementById('countdown-overlay');
  const cdNumber = document.getElementById('countdown-number');
  const flashOverlay = document.getElementById('flash-overlay');
  const sequence = [3, 2, 1];
  let i = 0;

  cdOverlay.classList.add('show');
  cdNumber.textContent = sequence[0];

  var startTime = performance.now();

  function tick(){
    var elapsed = performance.now() - startTime;
    var step = Math.floor(elapsed / 1000);

    if(step < sequence.length){
      var num = sequence[step];
      if(cdNumber.textContent !== String(num)){
        cdNumber.textContent = num;
      }
      requestAnimationFrame(tick);
    } else {
      // exactamente a los 3 segundos: flash rojo a pantalla completa,
      // confirmacion de rodaje (genera el payload con TC del dispositivo).
      // El QR se muestra DESPUES, al desaparecer el flash.
      cdOverlay.classList.remove('show');
      const clapPayload = buildFlashPayload();
      flashOverlay.classList.add('show');
      playClap();
      confirmRoll(clapPayload);
      setTimeout(function(){
        flashOverlay.classList.remove('show');
        state.lastClapPayload = clapPayload;
        saveState();
        setSub('qr');
        runQrFadeSequence(clapPayload);
      }, 1000);
    }
  }

  requestAnimationFrame(tick);
}

/* ---- sonido "clap" sintetizado (Web Audio API) ---- */
let audioCtx = null;

/* iOS Safari exige que el AudioContext se cree/reanude dentro de un
   gesto de usuario. Se llama en el primer touchstart de la pantalla
   para que playClap() suene mas tarde sin gesto directo. */
function unlockAudio(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
    const buffer = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(audioCtx.destination);
    src.start();
  }catch(e){ /* Web Audio no disponible: se omite el sonido */ }
}

function playClap(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    const ctx = audioCtx;
    const duration = 0.18;
    const bufferSize = Math.floor(ctx.sampleRate * duration);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++){
      data[i] = (Math.random()*2 - 1) * Math.pow(1 - i/bufferSize, 2);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const bandpass = ctx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 1800;
    bandpass.Q.value = 0.7;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

    noise.connect(bandpass);
    bandpass.connect(gain);
    gain.connect(ctx.destination);
    noise.start();
  }catch(e){ /* Web Audio no disponible: se omite el sonido */ }
}

/* ---- exportar log de sesion (CSV via Web Share API, con fallback de descarga) ---- */
function buildCSV(){
  const cols = ['ts','clap_ts','sc','sh','tk','cam','card','int','dn','toma_buena','good_enviado'];
  const lines = [cols.join(',')];
  state.log.forEach(row=>{
    lines.push(cols.map(c=>{
      let v = row[c];
      if(typeof v === 'boolean') v = v ? 'Si' : 'No';
      v = (v === null || v === undefined) ? '' : String(v);
      if(v.includes(',') || v.includes('"')) v = '"' + v.replace(/"/g,'""') + '"';
      return v;
    }).join(','));
  });
  return lines.join('\r\n');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}

async function exportLog(){
  if(state.log.length === 0){
    showToast(t('toast_no_log'));
    return;
  }
  const csv = buildCSV();
  const filename = `claqueta_log_${new Date().toISOString().slice(0,10)}.csv`;
  const blob = new Blob([csv], {type:'text/csv'});

  if(navigator.canShare && window.File){
    try{
      const file = new File([blob], filename, {type:'text/csv'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Log de sesión'});
        return;
      }
    }catch(e){ /* cancelado o no soportado: cae al fallback de descarga */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
document.getElementById('btn-export').addEventListener('click', exportLog);

/* ---- reiniciar sesion: vuelve a DEFAULT_STATE preservando el idioma,
   borra localStorage y vuelve a la pantalla de edicion. ---- */
function resetSession(){
  if(!confirm(t('reset_confirm'))) return;
  const lang = state.lang;
  localStorage.removeItem('claquetaState');
  state = Object.assign({}, DEFAULT_STATE);
  state.lang = lang;
  saveState();
  renderEdit();
  switchScreen('edit');
}
document.getElementById('btn-reset').addEventListener('click', resetSession);

/* ---- inicializacion ---- */
function init(){
  renderEdit();
  if(state.lastPayload) renderDataView(state.lastPayload);
  switchScreen(state.view || 'edit');
  let sub = state.sub || 'data';
  if(sub === 'qr' && !state.lastClapPayload) sub = 'data';
  setSub(sub);
}
init();

window.addEventListener('resize', ()=>{
  if(state.view === 'display' && state.sub === 'qr' && state.lastClapPayload) drawQR(state.lastClapPayload, document.getElementById('qr-canvas'), '#ffffff', '#000000');
});
</script>
